<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assist365 — Asistente Interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a6fd4;--blue-dark:#0d4fa0;--blue-light:#3d8ee8;
  --teal:#00b8a9;--teal-dim:rgba(0,184,169,0.1);--teal-border:rgba(0,184,169,0.22);
  --white:#fff;--surface:#f0f6ff;--surface2:#e2edf8;
  --border:#d4e2f4;--border-light:#e8f0fb;
  --text:#0d2545;--text-muted:#4a6080;--text-dim:#8aaac8;
  --font-head:"Outfit",sans-serif;--font-body:"Plus Jakarta Sans",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);font-size:15px;background:var(--surface);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-logo{position:absolute;bottom:-20px;right:-40px;opacity:0.05;width:400px}
.bg-logo img{width:100%}
.bg-c1{position:absolute;top:-160px;left:-160px;width:440px;height:440px;border-radius:50%;background:rgba(0,184,169,0.06)}
.bg-c2{position:absolute;bottom:80px;left:35%;width:160px;height:160px;border-radius:50%;background:rgba(26,111,212,0.05)}
.bg-dots{position:absolute;top:50px;right:30px;width:130px;height:130px;background-image:radial-gradient(circle,rgba(26,111,212,0.08) 1.5px,transparent 1.5px);background-size:16px 16px}
.layout{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 10px rgba(26,111,212,0.07)}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:36px;width:auto}
.logo-tagline{font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:0.5px;text-transform:uppercase;font-family:var(--font-head);margin-left:4px;align-self:flex-end;padding-bottom:2px}
.header-right{display:flex;align-items:center;gap:10px}
.internal-badge{background:var(--teal-dim);border:1px solid var(--teal-border);color:var(--teal);font-size:10px;font-family:var(--font-head);font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-btn{padding:5px 12px;font-size:11px;font-family:var(--font-head);font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all 0.15s;letter-spacing:0.5px}
.lang-btn.active{background:var(--blue);color:white}
.clear-btn{padding:6px 14px;font-size:12px;font-family:var(--font-body);cursor:pointer;border:1px solid var(--border);background:white;color:var(--text-muted);border-radius:8px;transition:all 0.15s}
.clear-btn:hover{border-color:var(--blue);color:var(--blue)}
.messages-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages-wrap::-webkit-scrollbar{width:4px}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.welcome{margin:auto;text-align:center;max-width:440px;padding:40px 20px;animation:fadeUp 0.5s ease both}
.welcome-logo{height:80px;width:auto;margin:0 auto 20px;display:block}
.welcome h2{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--blue-dark);margin-bottom:10px;letter-spacing:-0.4px}
.welcome p{color:var(--text-muted);line-height:1.65;font-size:14px;font-weight:300}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
.suggestion{padding:8px 14px;background:white;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;color:var(--text-muted);transition:all 0.15s;font-family:var(--font-body)}
.suggestion:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.msg{display:flex;gap:10px;animation:fadeUp 0.2s ease both;max-width:820px;width:100%;margin:0 auto}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--font-head);overflow:hidden}
.msg.bot .avatar{background:var(--blue);padding:5px}
.msg.bot .avatar img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.msg.user .avatar{background:var(--surface2);color:var(--blue);border:1px solid var(--border)}
.bubble{padding:11px 15px;border-radius:12px;line-height:1.65;font-size:14px}
.msg.bot .bubble{background:var(--white);border:1px solid var(--border-light);border-top-left-radius:4px;color:var(--text);box-shadow:0 1px 4px rgba(26,111,212,0.06)}
.msg.user .bubble{background:var(--blue);border-top-right-radius:4px;color:white;max-width:75%}
.suggested-text{margin-top:12px;padding:11px 14px;background:#f0fdf9;border:1px solid var(--teal-border);border-radius:8px;font-size:13px;line-height:1.6;color:#00695c}
.suggested-label{font-size:10px;font-weight:600;letter-spacing:0.8px;color:var(--teal);font-family:var(--font-head);margin-bottom:6px;display:block;text-transform:uppercase}
.copy-btn{margin-top:8px;padding:5px 12px;font-size:12px;background:white;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.copy-btn:hover,.copy-btn.copied{border-color:var(--teal);color:var(--teal)}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:bounce 1.2s infinite;opacity:0.5}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
.input-area{padding:14px 24px 18px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0;box-shadow:0 -1px 8px rgba(26,111,212,0.05)}
.input-wrap{display:flex;gap:10px;max-width:820px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 10px 10px 16px;transition:border-color 0.15s,box-shadow 0.15s}
.input-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,184,169,0.08)}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;max-height:120px;min-height:24px}
textarea::placeholder{color:var(--text-dim)}
.send-btn{width:36px;height:36px;background:var(--blue);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;align-self:flex-end}
.send-btn:hover{background:var(--blue-light)}
.send-btn:disabled{background:var(--surface2);cursor:not-allowed}
.send-btn svg{width:14px;height:14px}
.input-hint{text-align:center;font-size:11px;color:var(--text-dim);margin-top:8px;max-width:820px;margin-left:auto;margin-right:auto}
.config-banner{background:#fff5f5;border-bottom:1px solid #fed7d7;padding:10px 24px;font-size:13px;color:#c53030;display:none;align-items:center;gap:8px;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
</style>
</head>

function setLang(l){lang=l;document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));const t=texts[l];document.getElementById("welcome-title").textContent=t.welcomeTitle;document.getElementById("welcome-desc").textContent=t.welcomeDesc;document.getElementById("input").placeholder=t.placeholder;document.getElementById("input-hint").textContent=t.hint;const s=document.getElementById("suggestions");if(s)s.innerHTML=t.suggestions.map(x=>`<button class="suggestion" onclick="sendSuggestion(this)">${x}</button>`).join("")}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendSuggestion(btn){document.getElementById("input").value=btn.textContent;sendMessage()}
function clearChat(){history=[];const t=texts[lang];document.getElementById("messages").innerHTML=`<div class="welcome" id="welcome"><img class="welcome-logo" src="${LOGO_SRC}" alt="Assist365"><h2 id="welcome-title">${t.welcomeTitle}</h2><p id="welcome-desc">${t.welcomeDesc}</p><div class="suggestions" id="suggestions">${t.suggestions.map(x=>`<button class="suggestion" onclick="sendSuggestion(this)">${x}</button>`).join("")}</div></div>`}
function escHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmtBot(t){return escHtml(t).replace(/\n/g,"<br>")}
function copyText(btn,text){const t=texts[lang];navigator.clipboard.writeText(text).then(()=>{btn.textContent=t.copied;btn.classList.add("copied");setTimeout(()=>{btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> ${t.copy}`;btn.classList.remove("copied")},2000)})}
function botAvatar(){return `<div class="avatar" style="background:var(--blue);padding:5px"><img src="${LOGO_SRC}" style="width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)" alt=""></div>`}
function showTyping(){const w=document.getElementById("welcome");if(w)w.remove();const m=document.getElementById("messages");const d=document.createElement("div");d.className="msg bot";d.id="typing-indicator";d.innerHTML=botAvatar()+`<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;m.appendChild(d);m.scrollTop=m.scrollHeight}
function removeTyping(){const t=document.getElementById("typing-indicator");if(t)t.remove()}
function appendMessage(role,content){
  const w=document.getElementById("welcome");if(w)w.remove();
  const msgs=document.getElementById("messages");const t=texts[lang];
  const div=document.createElement("div");div.className=`msg ${role}`;
  let bubble=content,suggestedHTML="";
  if(role==="bot"&&content.includes("TEXTO SUGERIDO PARA EL CLIENTE:")){
    const parts=content.split("TEXTO SUGERIDO PARA EL CLIENTE:");
    bubble=parts[0].replace("📋","").trim();const st=parts[1]?parts[1].trim():"";
    if(st){const safe=st.replace(/`/g,"\\`").replace(/\$/g,"\\$");suggestedHTML=`<div class="suggested-text"><span class="suggested-label">Texto sugerido para el cliente</span>${escHtml(st)}</div><button class="copy-btn" onclick="copyText(this,\`${safe}\`)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> ${t.copy}</button>`}
  }
  const av=role==="bot"?botAvatar():`<div class="avatar">${t.you.slice(0,2).toUpperCase()}</div>`;
  div.innerHTML=`${av}<div class="bubble">${role==="bot"?fmtBot(bubble):escHtml(content)}${suggestedHTML}</div>`;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
async function sendMessage(){
  if(isLoading)return;const input=document.getElementById("input");const message=input.value.trim();if(!message)return;
  isLoading=true;input.value="";input.style.height="auto";document.getElementById("send-btn").disabled=true;
  appendMessage("user",message);showTyping();
  try{
    const res=await fetch(`${BACKEND_URL}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message,language:lang,history})});
    removeTyping();
    if(!res.ok){const err=await res.json().catch(()=>({}));appendMessage("bot",`${err.error||texts[lang].error}`)}
    else{const data=await res.json();appendMessage("bot",data.reply);history.push({role:"user",content:message});history.push({role:"assistant",content:data.reply});if(history.length>20)history=history.slice(-20)}
  }catch{removeTyping();document.getElementById("config-banner").style.display="flex";appendMessage("bot",texts[lang].error)}
  finally{isLoading=false;document.getElementById("send-btn").disabled=false;input.focus()}
}
fetch(`${BACKEND_URL}/health`).catch(()=>{document.getElementById("config-banner").style.display="flex"});
</script>
